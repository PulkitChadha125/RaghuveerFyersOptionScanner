<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RiverFlowScanner - Login</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" href="{{ url_for('static', filename='logo-192.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #162038;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #4f46e5;
            --danger: #ef4444;
            --border: #253252;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, #1c2744, var(--bg));
            color: var(--text);
            font-family: "Manrope", sans-serif;
        }
        .login-card {
            width: min(420px, 92vw);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 26px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }
        .sub {
            color: var(--muted);
            margin: 0 0 18px;
            font-size: 14px;
        }
        .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--muted);
        }
        input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: var(--text);
            padding: 11px 12px;
            font-size: 14px;
        }
        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            padding: 11px 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }
        .error {
            margin-bottom: 12px;
            color: #fecaca;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.45);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <form class="login-card" method="post">
        <h1>RiverFlowScanner Login</h1>
        <p class="sub">Only authorized users can access the scanner.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <div class="field">
            <label for="user_id">User ID</label>
            <input type="text" id="user_id" name="user_id" autocomplete="username" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
        <button type="submit">Login</button>
    </form>
    <script>
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}");
  }
    </script>
</body>
</html>
